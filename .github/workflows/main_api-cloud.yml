name: Build and deploy Node.js app to Azure Web App - api-cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          cd hw4/backend
          npm install
          # Dacă ai script de build (pentru TS -> JS), îl rulează aici
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Trimitem doar conținutul folderului backend
          path: hw4/backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_549E716B84CE4471A2F21B95578EE63C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5475DE685B5A45C4BABF02C4953E502E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B6D77F7BE36045419BCF201A4AF82AAE }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-cloud'
          slot-name: 'Production'
          # Punctul indică faptul că urcăm tot ce am descărcat în rădăcină
          package: .
